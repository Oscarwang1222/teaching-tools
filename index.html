<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML教学工具集</title>
    <style>
        :root {
            --primary-color: #4e54c8;
            --secondary-color: #8f94fb;
            --accent-color: #6c63ff;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --success-color: #28a745;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark-color);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0 20px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        header p {
            font-size: 1.2rem;
            color: #666;
            max-width: 700px;
            margin: 0 auto 20px;
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .search-container input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            box-shadow: var(--card-shadow);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }
        
        .search-container input:focus {
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .category-selector {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .category-btn {
            padding: 12px 25px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .category-btn:hover {
            background: #5a6268;
        }
        
        .category-btn .selected-count {
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .tool-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            position: relative;
        }
        
        .tool-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        
        .tool-icon {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 3rem;
        }
        
        .tool-content {
            padding: 20px;
        }
        
        .tool-content h3 {
            margin-bottom: 10px;
            color: var(--dark-color);
        }
        
        .tool-content p {
            color: #666;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        
        .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }
        
        .tool-tag {
            background: #e9ecef;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #495057;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            text-align: center;
        }
        
        .btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        .btn-block {
            display: block;
            width: 100%;
        }
        
        footer {
            text-align: center;
            padding: 20px 0;
            color: #666;
            border-top: 1px solid rgba(0,0,0,0.1);
            margin-top: 30px;
        }
        
        .featured {
            border: 2px solid var(--accent-color);
        }
        
        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-color);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.2rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
            font-size: 1.2rem;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            font-size: 1.2rem;
        }
        
        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: translateY(-20px);
            transition: var(--transition);
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            color: var(--dark-color);
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6c757d;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .category-section {
            margin-bottom: 25px;
        }
        
        .category-section h3 {
            margin-bottom: 15px;
            color: var(--primary-color);
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 8px;
        }
        
        .category-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .category-tag {
            padding: 8px 15px;
            background: #e9ecef;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }
        
        .category-tag:hover {
            background: #dee2e6;
        }
        
        .category-tag.selected {
            background: var(--primary-color);
            color: white;
        }
        
        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            header h1 {
                font-size: 2rem;
            }
            
            .modal {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HTML教学工具集</h1>
            <p>探索各种HTML演示工具，点击卡片进入相应的演示页面，学习并实践HTML技术</p>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="搜索工具...">
            </div>
            
            <div class="category-selector">
                <button class="category-btn" id="categorySelector">
                    <span>请选择标签</span>
                    <span class="selected-count" id="selectedCount">0</span>
                </button>
            </div>
        </header>
        
        <main>
            <div class="tools-grid" id="toolsGrid">
                <!-- 工具卡片将通过JavaScript动态生成 -->
            </div>
        </main>
        
        <footer>
            <p>HTML教学工具集 &copy; 2025 - Designed by Oscar</p>
        </footer>
    </div>

    <!-- 分类模态框 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2>选择筛选标签</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="category-section">
                    <h3>学科</h3>
                    <div class="category-tags" id="subjectTags">
                        <!-- 学科标签将通过JavaScript动态生成 -->
                    </div>
                </div>
                <div class="category-section">
                    <h3>功能</h3>
                    <div class="category-tags" id="functionTags">
                        <!-- 功能标签将通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="resetSelection">重置选择</button>
                <button class="btn" id="applySelection">应用筛选</button>
            </div>
        </div>
    </div>

    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            const toolsGrid = document.getElementById('toolsGrid');
            const searchInput = document.getElementById('searchInput');
            const categorySelector = document.getElementById('categorySelector');
            const categoryModal = document.getElementById('categoryModal');
            const closeModal = document.getElementById('closeModal');
            const subjectTags = document.getElementById('subjectTags');
            const functionTags = document.getElementById('functionTags');
            const resetSelection = document.getElementById('resetSelection');
            const applySelection = document.getElementById('applySelection');
            const selectedCount = document.getElementById('selectedCount');
            
            // 存储工具数据
            let tools = [];
            // 存储当前选中的标签
            let selectedSubjects = [];
            let selectedFunctions = [];
            
            // 预定义的学科列表
            const predefinedSubjects = [
                '语文', '数学', '英语', '物理', '化学', 
                '生物', '地理', '历史', '道法'
            ];
            
            // 加载工具配置
            loadToolsConfig();
            
            // 从配置文件加载工具数据
            function loadToolsConfig() {
                toolsGrid.innerHTML = '<p class="loading">正在加载工具配置...</p>';
                
                fetch('tools-config.json')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('配置文件加载失败');
                        }
                        return response.json();
                    })
                    .then(data => {
                        tools = data.tools || [];
                        initPage();
                    })
                    .catch(error => {
                        console.error('加载工具配置时出错:', error);
                        toolsGrid.innerHTML = '<p class="error">加载工具配置失败，请检查配置文件是否存在</p>';
                    });
            }
            
            // 初始化页面
            function initPage() {
                // 渲染工具卡片
                renderTools(tools);
                
                // 设置搜索功能
                setupSearch();
                
                // 设置分类模态框
                setupCategoryModal();
                
                // 更新选择计数
                updateSelectedCount();
            }
            
            // 生成学科标签
            function generateSubjectTags() {
                let subjectTagsHTML = '';
                
                predefinedSubjects.forEach(subject => {
                    const isSelected = selectedSubjects.includes(subject);
                    subjectTagsHTML += `
                        <div class="category-tag ${isSelected ? 'selected' : ''}" data-subject="${subject}">
                            ${subject}
                        </div>
                    `;
                });
                
                subjectTags.innerHTML = subjectTagsHTML;
            }
            
            // 生成功能标签
            function generateFunctionTags() {
                // 获取所有功能标签
                const allFunctions = new Set();
                tools.forEach(tool => {
                    if (tool.tags && Array.isArray(tool.tags)) {
                        tool.tags.forEach(tag => allFunctions.add(tag));
                    }
                });
                
                // 按字母顺序排序
                const sortedFunctions = Array.from(allFunctions).sort();
                
                let functionTagsHTML = '';
                
                sortedFunctions.forEach(func => {
                    const isSelected = selectedFunctions.includes(func);
                    functionTagsHTML += `
                        <div class="category-tag ${isSelected ? 'selected' : ''}" data-function="${func}">
                            ${func}
                        </div>
                    `;
                });
                
                functionTags.innerHTML = functionTagsHTML;
            }
            
            // 渲染工具卡片
            function renderTools(toolsToRender) {
                toolsGrid.innerHTML = '';
                
                if (toolsToRender.length === 0) {
                    toolsGrid.innerHTML = '<p class="no-results">没有找到匹配的工具</p>';
                    return;
                }
                
                toolsToRender.forEach(tool => {
                    const toolCard = document.createElement('div');
                    toolCard.className = 'tool-card';
                    if (tool.featured) {
                        toolCard.classList.add('featured');
                    }
                    
                    // 生成工具链接，使用工具名称作为文件名
                    const demoUrl = `${tool.name}.html`;
                    
                    // 生成学科标签HTML
                    const subjectTagsHTML = tool.subject && tool.subject.length > 0 
                        ? tool.subject.map(subject => `<span class="tool-tag">${subject}</span>`).join('')
                        : '';
                    
                    // 生成功能标签HTML
                    const functionTagsHTML = tool.tags && tool.tags.length > 0 
                        ? tool.tags.map(tag => `<span class="tool-tag">${tag}</span>`).join('')
                        : '';
                    
                    toolCard.innerHTML = `
                        ${tool.featured ? '<span class="featured-badge">推荐</span>' : ''}
                        <div class="tool-icon">
                            ${tool.icon || '📄'}
                        </div>
                        <div class="tool-content">
                            <h3>${tool.name}</h3>
                            <p>${tool.description}</p>
                            ${subjectTagsHTML ? `<div class="tool-tags">${subjectTagsHTML}</div>` : ''}
                            ${functionTagsHTML ? `<div class="tool-tags">${functionTagsHTML}</div>` : ''}
                            <a href="${demoUrl}" class="btn btn-block">进入演示</a>
                        </div>
                    `;
                    
                    toolsGrid.appendChild(toolCard);
                });
            }
            
            // 过滤工具
            function filterTools() {
                let filteredTools = tools;
                
                // 根据搜索词过滤
                const searchTerm = searchInput.value.toLowerCase();
                if (searchTerm) {
                    filteredTools = filteredTools.filter(tool => 
                        tool.name.toLowerCase().includes(searchTerm) || 
                        tool.description.toLowerCase().includes(searchTerm) ||
                        (tool.subject && tool.subject.some(subject => subject.toLowerCase().includes(searchTerm))) ||
                        (tool.tags && tool.tags.some(tag => tag.toLowerCase().includes(searchTerm)))
                    );
                }
                
                // 根据学科标签过滤
                if (selectedSubjects.length > 0) {
                    filteredTools = filteredTools.filter(tool => 
                        tool.subject && tool.subject.some(subject => selectedSubjects.includes(subject))
                    );
                }
                
                // 根据功能标签过滤
                if (selectedFunctions.length > 0) {
                    filteredTools = filteredTools.filter(tool => 
                        tool.tags && tool.tags.some(tag => selectedFunctions.includes(tag))
                    );
                }
                
                renderTools(filteredTools);
            }
            
            // 设置搜索功能
            function setupSearch() {
                searchInput.addEventListener('input', function() {
                    filterTools();
                });
            }
            
            // 设置分类模态框
            function setupCategoryModal() {
                // 打开模态框
                categorySelector.addEventListener('click', function() {
                    generateSubjectTags();
                    generateFunctionTags();
                    categoryModal.classList.add('active');
                });
                
                // 关闭模态框
                closeModal.addEventListener('click', function() {
                    categoryModal.classList.remove('active');
                });
                
                // 点击模态框外部关闭
                categoryModal.addEventListener('click', function(e) {
                    if (e.target === categoryModal) {
                        categoryModal.classList.remove('active');
                    }
                });
                
                // 选择学科标签
                subjectTags.addEventListener('click', function(e) {
                    if (e.target.classList.contains('category-tag')) {
                        const subject = e.target.dataset.subject;
                        toggleSelection(selectedSubjects, subject);
                        e.target.classList.toggle('selected');
                        updateSelectedCount();
                    }
                });
                
                // 选择功能标签
                functionTags.addEventListener('click', function(e) {
                    if (e.target.classList.contains('category-tag')) {
                        const func = e.target.dataset.function;
                        toggleSelection(selectedFunctions, func);
                        e.target.classList.toggle('selected');
                        updateSelectedCount();
                    }
                });
                
                // 重置选择
                resetSelection.addEventListener('click', function() {
                    selectedSubjects = [];
                    selectedFunctions = [];
                    generateSubjectTags();
                    generateFunctionTags();
                    updateSelectedCount();
                });
                
                // 应用筛选
                applySelection.addEventListener('click', function() {
                    filterTools();
                    categoryModal.classList.remove('active');
                    
                    // 更新按钮文本
                    if (selectedSubjects.length === 0 && selectedFunctions.length === 0) {
                        categorySelector.querySelector('span').textContent = '请选择标签';
                    } else {
                        categorySelector.querySelector('span').textContent = '已选择标签';
                    }
                });
            }
            
            // 切换选择状态
            function toggleSelection(selectionArray, item) {
                const index = selectionArray.indexOf(item);
                if (index === -1) {
                    selectionArray.push(item);
                } else {
                    selectionArray.splice(index, 1);
                }
            }
            
            // 更新选择计数
            function updateSelectedCount() {
                const totalSelected = selectedSubjects.length + selectedFunctions.length;
                selectedCount.textContent = totalSelected;
            }
        });
    </script>
</body>
</html>
